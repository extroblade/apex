# Cache zones + rate-limit zone (this file is included within nginx's http{} block).
proxy_cache_path /var/cache/nginx/media levels=1:2 keys_zone=media_cache:10m
    max_size=100m inactive=7d use_temp_path=off;
proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m
    max_size=20m inactive=10m use_temp_path=off;
# Coarse per-IP flood backstop for credential endpoints; the Go httprate
# middleware (AUTH_RATE_LIMIT) enforces the precise per-minute policy behind it.
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=60r/m;

# Security headers are set at the server level below (with `always`, so they ride
# error responses too). nginx drops server-level add_header inside a location
# that sets its own, so the security-critical HTML response repeats them.

server {
    listen 80;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Content-Security-Policy: the app ships an inline theme-bootstrap script
    # and Tailwind-generated inline styles, so script-src/style-src allow
    # 'unsafe-inline'. Everything else is locked to 'self' (and data:/blob:
    # for images — avatars and generated catalog art are data: URLs).
    # frame-ancestors 'none' supersedes X-Frame-Options for CSP-aware clients.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    # Enable once TLS terminates in front of this service:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # App bundle assets are content-hashed → cache them forever.
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Feature flags rarely change — cache briefly at the edge.
    location = /api/features {
        proxy_pass http://backend:8080;
        proxy_cache api_cache;
        proxy_cache_valid 200 30s;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Rate-limit only credential entry points. Keep /api/auth/me and logout
    # outside this limiter so normal app boot/session checks aren't throttled.
    location ~ ^/api/auth/(register|login|password-reset/request|password-reset/confirm|verify-email/request)$ {
        limit_req zone=auth_limit burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Remaining auth routes (me/logout/verify-email confirm/account lifecycle...)
    # are still protected by backend auth and route-level logic, but not by the
    # nginx credential limiter.
    location /api/auth/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # The menu lives in its own service. This is a longer prefix than /api/, so
    # nginx routes /api/nav here and everything else to the backend.
    location /api/nav {
        proxy_pass http://nav:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy API requests to the backend service.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Media assets (default avatars) from the static service — cached at the edge.
    # NOTE: /media (not /static) — rsbuild serves the app's own JS/CSS under /static.
    location /media/ {
        proxy_pass http://static/;
        proxy_set_header Host $host;
        proxy_cache media_cache;
        proxy_cache_valid 200 7d;
        add_header X-Cache-Status $upstream_cache_status;
        expires 7d;
    }

    # SPA fallback: serve index.html for client-side routes (not cached).
    location / {
        add_header Cache-Control "no-cache";
        # Repeat the security headers (this location sets its own add_header,
        # which otherwise suppresses the server-level ones).
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        try_files $uri $uri/ /index.html;
    }
}
