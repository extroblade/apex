name: bff-ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: bff-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck, lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bff
    steps:
      - uses: actions/checkout@v4

      # Installs the pnpm version pinned by package.json "packageManager".
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: bff/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: bff/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm run typecheck

      - name: lint
        run: pnpm run lint

      - name: prettier check
        run: pnpm run format:check

      - name: unit tests
        run: pnpm test

      - name: build
        run: pnpm run build

  # Build & push the BFF image to GHCR. Only on main pushes and version tags.
  build-image:
    name: build & push image
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.OWNER_LC }}/contentpilot-bff
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}

      - name: build & push
        uses: docker/build-push-action@v6
        with:
          context: bff
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
