# Static asset service (default avatars + rehosted catalog images). Self-contained;
# joins the shared external network so the frontend's nginx can proxy /media/*
# to it. Catalog images live in the shared contentpilot-media-data volume written by the
# scheduler and mounted here at /usr/share/nginx/html/catalog.
name: contentpilot-static

services:
  static:
    build: .
    restart: unless-stopped
    volumes:
      - media-data:/usr/share/nginx/html/catalog:ro
    networks:
      - contentpilot-net

volumes:
  media-data:
    external: true
    name: contentpilot-media-data

networks:
  contentpilot-net:
    external: true
