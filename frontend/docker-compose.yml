# Frontend stack: nginx-served SPA. Self-contained so it can move to its own
# repo later. Joins the shared external network `contentpilot-net`; nginx proxies
# /api to the `backend` service running in the backend compose project.
name: contentpilot-frontend

services:
  frontend:
    build: .
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - contentpilot-net

networks:
  contentpilot-net:
    external: true
