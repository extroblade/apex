<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#0b0b0c" />
    <title>Apex — race planner</title>
    <!-- Preload the boot requests so first paint has data ready. -->
    <link rel="preload" href="/api/features" as="fetch" crossorigin="use-credentials" />
    <link rel="preload" href="/api/auth/me" as="fetch" crossorigin="use-credentials" />
    <link rel="preload" href="/media/locales/index.json" as="fetch" crossorigin="anonymous" />
    <script>
      // Apply the saved theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem('theme');
          var e = document.documentElement;
          e.classList.remove('dark', 'custom');
          if (t === 'dark') e.classList.add('dark');
          else if (t === 'custom') e.classList.add('custom');
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
