# Backend stack: MySQL + Go API. Self-contained so it can move to its own
# repo later. Joins the shared external network `contentpilot-net` so the frontend
# (a separate compose project) can reach the `backend` service by name.
name: contentpilot-backend

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root}"
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: "${DB_PASSWORD:-app}"
    ports:
      # Bound to loopback: reachable for local dev/tools, NOT the host's public
      # interface. For production, drop this mapping entirely (services reach db
      # over contentpilot-net) and set strong passwords via .env.
      - "127.0.0.1:3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Schema is managed by the app's migration runner (internal/migrate),
      # applied on startup — no initdb mount needed.
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - contentpilot-net

  # Fail-open cache shared by the API. No external port — only reachable inside
  # contentpilot-net. If it goes down the app keeps working (reads fall through to MySQL).
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - contentpilot-net

  backend:
    build: .
    restart: unless-stopped
    environment:
      PORT: "8080"
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: app
      DB_PASSWORD: "${DB_PASSWORD:-app}"
      DB_NAME: app
      # Same-origin behind nginx needs no CORS; this allowlist only matters for
      # direct cross-origin API calls (e.g. a separate dev frontend host).
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:3000}"
      # Redis cache (fail-open). Point at the redis service; unset to disable.
      REDIS_ADDR: "redis:6379"
      # Auth attempts/min/IP (register+login). 0 disables (e2e sets it, since all
      # test traffic comes from one IP).
      AUTH_RATE_LIMIT: "${AUTH_RATE_LIMIT:-20}"
      # Cockpit dev-overlay key: open the app with ?dev=<key> to unlock it.
      # Defaults to "3" so the overlay works out of the box in any environment
      # this compose starts. Empty disables Cockpit entirely.
      # SECURITY: "3" is a convenience default — anyone who knows it can toggle
      # your feature flags. Override DEVELOPER_KEY for any public deploy.
      DEVELOPER_KEY: "${DEVELOPER_KEY:-3}"
      # Transactional email (password reset, email verification). Empty
      # SMTP_HOST disables the mailer — the flows still run but no mail is
      # delivered. For local dev, run Mailpit on 1025 and set SMTP_HOST=mailpit
      # SMTP_PORT=1025. Production: point at your transactional provider.
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM: "${SMTP_FROM:-ContentPilot <no-reply@contentpilot.app>}"
      # Public origin used to build links in transactional emails.
      APP_BASE_URL: "${APP_BASE_URL:-http://localhost:3000}"
      # Stripe billing (Variant A). Empty secret keeps checkout/portal disabled.
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      STRIPE_PRO_PRICE_ID: "${STRIPE_PRO_PRICE_ID:-}"
      STRIPE_SUCCESS_URL: "${STRIPE_SUCCESS_URL:-http://localhost:3000/upgrade?checkout=success}"
      STRIPE_CANCEL_URL: "${STRIPE_CANCEL_URL:-http://localhost:3000/upgrade?checkout=cancel}"
      STRIPE_PORTAL_RETURN_URL: "${STRIPE_PORTAL_RETURN_URL:-http://localhost:3000/upgrade}"
      # Encrypts stored iRacing refresh tokens at rest (AES-256-GCM). Empty =
      # iRacing linking stays disabled (it's flag-gated off anyway). NEVER commit
      # a real key — set it in a gitignored .env: head -c 32 /dev/urandom | base64
      APP_ENCRYPTION_KEY: "${APP_ENCRYPTION_KEY:-}"
      # Fill these after registering an OAuth app with iRacing to enable linking.
      IRACING_CLIENT_ID: "${IRACING_CLIENT_ID:-}"
      IRACING_CLIENT_SECRET: "${IRACING_CLIENT_SECRET:-}"
      IRACING_OAUTH_REDIRECT_URI: "${IRACING_OAUTH_REDIRECT_URI:-http://localhost:3000/api/iracing/callback}"
    ports:
      # Loopback only — nginx proxies /api in prod, and /metrics must not be
      # public. Drop this mapping entirely for a production deploy.
      - "127.0.0.1:8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - contentpilot-net

  # Daily season-schedule sync: probes iRacing PDF URLs and scans ./schedules
  # for manually downloaded PDFs, parsing new ones into season_schedule. Also
  # rehosts catalog images into the shared media volume and fills descriptions.
  scheduler:
    build: .
    entrypoint: ["/app/scheduler"]
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: app
      DB_PASSWORD: app
      DB_NAME: app
      SCHEDULE_PDF_DIR: /schedules
      # The shared media volume is mounted here at /media-data and, in the static
      # service, at /usr/share/nginx/html/catalog — so the volume root IS the
      # "catalog" dir. Images go to <root>/cars|tracks and are served at
      # /media/catalog/... (do NOT add a nested /catalog here — that double-nests).
      CATALOG_IMAGE_DIR: /media-data
      # SCHEDULE_PDF_URLS: comma-separated extra URLs to probe
      # SCHEDULE_CHECK_INTERVAL: e.g. 1h (default 24h)
    volumes:
      - ./schedules:/schedules:ro
      - media-data:/media-data
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - contentpilot-net

volumes:
  db_data:
    # Pinned so the compose-project rename (vcapp-backend → contentpilot-backend)
    # can't silently create a fresh empty volume. dev.sh migrates the old
    # vcapp-backend_db_data contents into this one on first run.
    name: contentpilot-db-data
  media-data:
    # Shared with the static service so rehosted catalog images are served
    # under /media/catalog/* by the frontend nginx proxy.
    name: contentpilot-media-data

networks:
  contentpilot-net:
    external: true
