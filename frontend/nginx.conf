# Cache zones (this file is included within nginx's http{} block).
proxy_cache_path /var/cache/nginx/media levels=1:2 keys_zone=media_cache:10m
    max_size=100m inactive=7d use_temp_path=off;
proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m
    max_size=20m inactive=10m use_temp_path=off;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # App bundle assets are content-hashed → cache them forever.
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Feature flags rarely change — cache briefly at the edge.
    location = /api/features {
        proxy_pass http://backend:8080;
        proxy_cache api_cache;
        proxy_cache_valid 200 30s;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # The menu lives in its own service. This is a longer prefix than /api/, so
    # nginx routes /api/nav here and everything else to the backend.
    location /api/nav {
        proxy_pass http://nav:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy API requests to the backend service.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Media assets (default avatars) from the static service — cached at the edge.
    # NOTE: /media (not /static) — rsbuild serves the app's own JS/CSS under /static.
    location /media/ {
        proxy_pass http://static/;
        proxy_set_header Host $host;
        proxy_cache media_cache;
        proxy_cache_valid 200 7d;
        add_header X-Cache-Status $upstream_cache_status;
        expires 7d;
    }

    # SPA fallback: serve index.html for client-side routes (not cached).
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
